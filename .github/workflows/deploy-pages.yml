# Build the Vite site and deploy to GitHub Pages (use with custom domain + base: '/').
#
# GitHub: Repo → Settings → Pages → Build and deployment → Source MUST be "GitHub Actions".
# If Source is "Deploy from branch" with folder "/" or "/ (root)", the site serves the repo
# root index.html → script /src/main.jsx → browser error: MIME type "text/jsx" (not a JS module).
# The workflow uploads ./dist only, which contains bundled /assets/*.js from `npm run build`.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
